[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "mesa",
  "expat",
  "xorg.libX11",
  "xorg.libXext",
  "glib",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3",
]

[phases.build]
cmds = ["npm ci", "npm run build"]

[start]
cmd = "npm run start"
